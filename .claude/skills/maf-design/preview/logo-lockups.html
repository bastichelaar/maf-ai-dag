<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background:#fff; margin:0; }
    .card { padding: 24px 28px; box-sizing: border-box; display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .lockup { position: relative; display:flex; align-items:center; justify-content:center; min-height: 140px; border-radius: 10px; padding: 22px; overflow: hidden; }
    .lockup img { max-width: 80%; max-height: 80px; object-fit: contain; }
    .on-white  { background: #FFFFFF; box-shadow: inset 0 0 0 1px rgba(31,42,58,.10); }
    .on-cream  { background: #FAF7F2; }
    .on-blue   { background: #004073; }
    .on-ink    { background: #1F2A3A; }
    .label { position: absolute; top: 8px; left: 12px; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(31,42,58,.5); }
    .on-blue .label, .on-ink .label { color: rgba(255,255,255,.55); }
  </style>
</head>
<body>
  <div class="card">
    <div class="lockup on-white"><span class="label">on white</span><img src="../assets/logo-maf-official.png" alt="MAF logo"></div>
    <div class="lockup on-cream"><span class="label">on cream</span><img src="../assets/logo-maf-official.png" alt="MAF logo"></div>
    <div class="lockup on-blue"><span class="label">on brand blue</span><img src="../assets/logo-maf-official-reverse.png" alt="MAF logo, reverse"></div>
    <div class="lockup on-ink"><span class="label">on ink</span><img src="../assets/logo-maf-official-reverse.png" alt="MAF logo, reverse"></div>
  </div>
</body>
</html>
