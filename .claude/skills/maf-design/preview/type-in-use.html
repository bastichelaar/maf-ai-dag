<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background:#fff; margin:0; }
    .card { padding: 22px 28px; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }
    blockquote { margin: 0; padding: 8px 22px; border-left: 3px solid #450003; font-size: 19px; font-style: italic; color: #1F2A3A; line-height: 1.35; }
    blockquote cite { display:block; margin-top: 10px; font-size: 12px; color: rgba(31,42,58,.55); font-style: normal; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
    .body p { font-size: 15px; line-height: 1.6; color: rgba(31,42,58,.85); margin: 0 0 10px; }
    .body a { color: #450003; text-decoration: none; font-weight: 600; }
    .body a::after { content: " →"; }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid">
      <blockquote>
        Geen weg is te moeilijk en geen afstand te groot — Zijn liefde voor de mensen is altijd groter.
        <cite>— Sam, partner in Oeganda</cite>
      </blockquote>
      <div class="body">
        <p>In veel gebieden waar MAF vliegt zijn wegen onbegaanbaar of simpelweg niet aanwezig. Een vlucht van 45 minuten vervangt soms een autorit van negen uur.</p>
        <p><a href="#">Lees het hele verhaal</a></p>
      </div>
    </div>
  </div>
</body>
</html>
