<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background:#fff; margin:0; }
    .nav { display:flex; align-items:center; justify-content:space-between; padding: 14px 28px; box-sizing: border-box; border-bottom: 1px solid rgba(31,42,58,.08); }
    .left { display:flex; align-items:center; gap: 28px; }
    .logo { height: 38px; width: auto; }
    .links { display:flex; gap: 22px; }
    .links a { color: #1F2A3A; font-weight: 600; font-size: 14px; text-decoration: none; padding: 8px 0; position: relative; }
    .links a.active { color: #450003; }
    .links a.active::after { content: ""; position:absolute; left: 0; right: 0; bottom: 0; height: 2px; background: #450003; }
    .right { display:flex; align-items:center; gap: 14px; }
    .donate { background: #450003; color: #fff; font-weight: 700; font-size: 14px; padding: 10px 18px; border-radius: 6px; text-decoration: none; }
    .icon { width: 20px; height: 20px; color: #1F2A3A; }
    .lang { font-size: 13px; font-weight: 600; color: rgba(31,42,58,.7); }
  </style>
</head>
<body>
  <div class="nav">
    <div class="left">
      <img class="logo" src="../assets/logo-maf-official.png" alt="MAF">
      <div class="links">
        <a href="#" class="active">Ons werk</a>
        <a href="#">Verhalen</a>
        <a href="#">Over MAF</a>
        <a href="#">Werken bij</a>
        <a href="#">Contact</a>
      </div>
    </div>
    <div class="right">
      <span class="lang">NL</span>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <a href="#" class="donate">Doneer</a>
    </div>
  </div>
</body>
</html>
