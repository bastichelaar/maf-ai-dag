<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background:#fff; margin:0; }
    .card { padding: 28px 32px; box-sizing: border-box; }
    .specimen { font-family: var(--font-display); color: var(--maf-ink); line-height: 1.05; letter-spacing: -0.02em; }
    .huge { font-size: 84px; font-weight: 800; }
    .meta { margin-top: 16px; font-size: 12px; color: rgba(31,42,58,.55); font-family: ui-monospace, Menlo, monospace; letter-spacing: 0.02em; }
    .stack { display:flex; align-items: baseline; gap: 14px; }
    .accent { color: var(--maf-red); }
  </style>
</head>
<body>
  <div class="card">
    <div class="specimen">
      <div class="stack">
        <div class="huge">Aa</div>
        <div class="huge accent">Bb</div>
        <div class="huge" style="font-weight:400">Vv</div>
        <div class="huge" style="font-weight:300">Ll</div>
      </div>
    </div>
    <div class="meta">TISA SANS PRO · 300 / 400 / 600 / 700 / 800 · MAF HOUSE FONT (MULISH SHOWN AS SUBSTITUTE)</div>
  </div>
</body>
</html>
