<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background: #fff; margin: 0; }
    .card { padding: 24px 28px; box-sizing: border-box; }
    .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin-bottom: 14px; }
    .row:last-child { margin-bottom: 0; }
    .label { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #1F2A3A; margin-bottom: 6px; }
    .step { height: 46px; border-radius: 6px; position: relative; box-shadow: inset 0 0 0 1px rgba(31,42,58,.06); display:flex; align-items:flex-end; padding: 5px 7px; }
    .step span { font-family: ui-monospace, Menlo, monospace; font-size: 10px; font-weight: 600; }
    .light span { color: #1F2A3A; }
    .dark span { color: #fff; opacity: 0.95; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Red ramp</div>
    <div class="row">
      <div class="step light" style="background:#F8E8E8"><span>50</span></div>
      <div class="step light" style="background:#EBC4C5"><span>100</span></div>
      <div class="step light" style="background:#D58A8C"><span>200</span></div>
      <div class="step light" style="background:#B85355"><span>300</span></div>
      <div class="step dark" style="background:#8C2426"><span>400</span></div>
      <div class="step dark" style="background:#450003"><span>500</span></div>
      <div class="step dark" style="background:#380003"><span>600</span></div>
      <div class="step dark" style="background:#2A0002"><span>700</span></div>
      <div class="step dark" style="background:#1C0001"><span>800</span></div>
      <div class="step dark" style="background:#0E0000"><span>900</span></div>
    </div>
    <div class="label">Blue ramp</div>
    <div class="row">
      <div class="step light" style="background:#E6EEF5"><span>50</span></div>
      <div class="step light" style="background:#B8CFE3"><span>100</span></div>
      <div class="step light" style="background:#7FA8C9"><span>200</span></div>
      <div class="step dark" style="background:#4682AE"><span>300</span></div>
      <div class="step dark" style="background:#1D6094"><span>400</span></div>
      <div class="step dark" style="background:#004073"><span>500</span></div>
      <div class="step dark" style="background:#00345E"><span>600</span></div>
      <div class="step dark" style="background:#002848"><span>700</span></div>
      <div class="step dark" style="background:#001C33"><span>800</span></div>
      <div class="step dark" style="background:#00101D"><span>900</span></div>
    </div>
    <div class="label">Gray ramp</div>
    <div class="row">
      <div class="step light" style="background:#F2F3F5"><span>50</span></div>
      <div class="step light" style="background:#DDE0E3"><span>100</span></div>
      <div class="step light" style="background:#B8BDC3"><span>200</span></div>
      <div class="step light" style="background:#8B9097"><span>300</span></div>
      <div class="step dark" style="background:#6F767D"><span>400</span></div>
      <div class="step dark" style="background:#5B6770"><span>500</span></div>
      <div class="step dark" style="background:#4A555E"><span>600</span></div>
      <div class="step dark" style="background:#404952"><span>700</span></div>
      <div class="step dark" style="background:#2F353C"><span>800</span></div>
      <div class="step dark" style="background:#1F242A"><span>900</span></div>
    </div>
  </div>
</body>
</html>
