<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background:#fff; margin:0; }
    .card { padding: 26px 28px; box-sizing: border-box; }
    .row { display:flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .btn { font-family: var(--font-sans); font-size: 15px; font-weight: 600; border-radius: 6px; padding: 12px 22px; cursor: pointer; border: 0; letter-spacing: 0.01em; transition: all 150ms cubic-bezier(0.2,0.8,0.2,1); display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #450003; color: #fff; }
    .btn-primary:hover { background: #380003; }
    .btn-secondary { background: #1F2A3A; color: #fff; }
    .btn-outline { background: transparent; color: #450003; box-shadow: inset 0 0 0 1.5px #450003; }
    .btn-outline:hover { background: rgba(69,0,3,.06); }
    .btn-ghost { background: transparent; color: #1F2A3A; }
    .btn-ghost:hover { background: rgba(31,42,58,.05); }
    .btn-sm { padding: 8px 14px; font-size: 13px; }
    .btn-lg { padding: 16px 28px; font-size: 17px; }
    .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
    .arrow { display:inline-block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <button class="btn btn-primary">Doneer nu <span class="arrow">→</span></button>
      <button class="btn btn-secondary">Meer informatie</button>
      <button class="btn btn-outline">Steun ons</button>
      <button class="btn btn-ghost">Annuleren</button>
      <button class="btn btn-primary" disabled>Verzonden</button>
    </div>
    <div class="row" style="margin-top:14px">
      <button class="btn btn-primary btn-lg">Maak een verschil <span class="arrow">→</span></button>
      <button class="btn btn-primary">Doneer €25</button>
      <button class="btn btn-primary btn-sm">Aanmelden</button>
    </div>
  </div>
</body>
</html>
