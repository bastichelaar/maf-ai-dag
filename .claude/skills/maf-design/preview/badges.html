<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background:#fff; margin:0; }
    .card { padding: 22px 28px; box-sizing: border-box; display:flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .badge { display:inline-flex; align-items:center; gap:6px; padding: 5px 12px; border-radius: 9999px; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .b-red { background: #F8E8E8; color: #2A0002; }
    .b-ink { background: rgba(31,42,58,.08); color: #1F2A3A; }
    .b-sky { background: #EAF4FB; color: #2E7AAB; }
    .b-leaf { background: #EEF3E3; color: #4F6F2A; }
    .b-solid { background: #450003; color: #fff; }
    .b-ink-solid { background: #1F2A3A; color: #fff; }
    .dot { width: 6px; height: 6px; border-radius: 9999px; background: currentColor; }
    .tag { display:inline-flex; align-items:center; padding: 4px 10px; border-radius: 4px; background: #F4EDE2; color: #1F2A3A; font-size: 12px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge b-red"><span class="dot"></span>Noodhulp</span>
    <span class="badge b-solid">Doneer nu</span>
    <span class="badge b-ink">CBF Erkend</span>
    <span class="badge b-sky">ANBI</span>
    <span class="badge b-leaf"><span class="dot"></span>Live in Oeganda</span>
    <span class="badge b-ink-solid">Mission Aviation Fellowship</span>
    <span class="tag">#Papoea</span>
    <span class="tag">#Zending</span>
    <span class="tag">#Medische evacuatie</span>
    <span class="tag">#Vliegtuig</span>
  </div>
</body>
</html>
