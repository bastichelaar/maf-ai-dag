<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background:#fff; margin:0; }
    .band { background: #450003; color: #fff; padding: 32px 36px; box-sizing: border-box; display:flex; align-items:center; justify-content: space-between; gap: 24px; }
    .band h3 { margin: 0 0 6px; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; color: #fff; line-height: 1.15; }
    .band p { margin: 0; font-size: 15px; opacity: 0.9; max-width: 460px; }
    .band .cta { background: #fff; color: #450003; padding: 14px 24px; border-radius: 6px; font-weight: 700; text-decoration: none; font-size: 15px; white-space: nowrap; }
    .band .cta::after { content: " →"; }
  </style>
</head>
<body>
  <div class="band">
    <div>
      <h3>Steun ons werk in afgelegen gebieden</h3>
      <p>Uw bijdrage maakt elke vlucht mogelijk — een levenslijn voor mensen in nood.</p>
    </div>
    <a href="#" class="cta">Doneer vandaag</a>
  </div>
</body>
</html>
