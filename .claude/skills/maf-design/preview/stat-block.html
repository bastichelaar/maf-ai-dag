<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body { background:#fff; margin:0; }
    .card { padding: 22px 28px; box-sizing: border-box; }
    .stats { display:grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
    .stat .n { font-family: var(--font-display); font-size: 48px; font-weight: 800; color: #450003; line-height: 1; letter-spacing: -0.02em; }
    .stat .l { margin-top: 8px; font-size: 13px; color: rgba(31,42,58,.7); line-height: 1.35; }
    .stat .l strong { color: #1F2A3A; font-weight: 700; display: block; font-size: 14px; margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="stats">
      <div class="stat"><div class="n">130</div><div class="l"><strong>Vliegtuigen</strong>in 30+ landen wereldwijd</div></div>
      <div class="stat"><div class="n">1.500+</div><div class="l"><strong>Partners</strong>kerken en hulporganisaties</div></div>
      <div class="stat"><div class="n">189K</div><div class="l"><strong>Passagiers</strong>vervoerd per jaar</div></div>
      <div class="stat"><div class="n">65+</div><div class="l"><strong>Jaar</strong>vliegen voor leven</div></div>
    </div>
  </div>
</body>
</html>
