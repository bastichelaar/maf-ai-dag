<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>MAF Social Card 1080x1080, Tagamembo</title>
  <!--
    Bedoeld voor screenshot via DevTools op 1080x1080 viewport.
    Chrome of Firefox openen, DevTools (F12), device-mode aan, custom 1080x1080,
    pagina-screenshot via DevTools-menu. Output is dan een vierkant PNG voor Instagram of LinkedIn.
  -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1080px; overflow: hidden; }
    @import url('https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800;900&display=swap');
    body { font-family: 'Mulish', Georgia, Arial, sans-serif; color: #1F2A3A; background: #FAF7F2; }
    .card { width: 1080px; height: 1080px; display: flex; flex-direction: column; }

    .photo {
      flex: 0 0 620px;
      position: relative;
      background-image: url('images/card-tagamembo.png');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }
    .photo::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(31,42,58,0.65) 0%, rgba(31,42,58,0) 45%),
                  linear-gradient(to bottom, rgba(31,42,58,0.35) 0%, rgba(31,42,58,0) 30%);
    }
    .photo .label {
      position: absolute; top: 56px; left: 56px;
      display: inline-flex; align-items: center; gap: 14px;
      font-size: 20px; font-weight: 800; color: #fff;
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .photo .label .bar { display: inline-block; width: 44px; height: 3px; background: #fff; }
    .photo .country {
      position: absolute; bottom: 48px; left: 56px;
      color: #fff; font-size: 18px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      opacity: 0.95;
    }

    .body {
      flex: 1; background: #FAF7F2;
      padding: 56px 64px 48px 64px;
      display: flex; flex-direction: column; justify-content: space-between;
      position: relative;
    }
    .body::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #450003;
    }

    .eyebrow {
      font-size: 16px; font-weight: 800; color: #450003;
      letter-spacing: 0.16em; text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 52px; font-weight: 800;
      color: #1F2A3A; line-height: 1.1; letter-spacing: -0.02em;
      max-width: 880px;
    }
    .caption {
      font-size: 20px; line-height: 1.5; color: rgba(31,42,58,0.78);
      margin-top: 18px; max-width: 860px;
    }

    .footer {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 24px; margin-top: 24px;
    }
    .brand { display: flex; align-items: center; gap: 16px; }
    .brand .logo {
      width: 70px; height: 70px; border-radius: 14px;
      background: #004073; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900; letter-spacing: 0.04em;
      box-shadow: 0 4px 12px rgba(0,64,115,0.25);
    }
    .brand .name { font-size: 20px; font-weight: 800; color: #1F2A3A; line-height: 1.1; }
    .brand .name span { display: block; font-size: 14px; font-weight: 600; color: rgba(31,42,58,0.6); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }

    .tags {
      font-size: 17px; font-weight: 700; color: #004073;
      letter-spacing: 0.02em;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="photo">
      <div class="label"><span class="bar"></span> Vliegen voor Leven</div>
      <div class="country">Tagamembo · Papua</div>
    </div>
    <div class="body">
      <div>
        <div class="eyebrow">Medische evacuatie</div>
        <h1>35 minuten vliegen voor een moeder en haar tweeling.</h1>
        <p class="caption">Op een donderdagmiddag in mei vertrok Cessna PK-MEH richting Tagamembo. Geen weg te moeilijk, geen afstand te groot.</p>
      </div>
      <div class="footer">
        <div class="brand">
          <div class="logo">MAF</div>
          <div class="name">
            MAF Nederland
            <span>maf.nl</span>
          </div>
        </div>
        <div class="tags">
          #MAFNederland<br>
          #VliegenVoorLeven
        </div>
      </div>
    </div>
  </div>
</body>
</html>
